name: Preview Comment

on:
  workflow_run:
    workflows: ["Preview Build"]
    types:
      - completed
jobs:
  comment-preview-url:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write

    steps:
      - name: Find PR number
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setFailed("No pull request found for this workflow run");
              return;
            }
            core.setOutput("number", prs[0].number.toString());

      - name: Create or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          message: >
            🚀 Preview environment is ready:
            http://pr-${{ steps.pr.outputs.number }}.18-185-231-49.nip.io:30080

      - name: Set GitHub deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.workflow_run.head_sha,
              state: 'success',
              target_url: `http://pr-${process.env.PR_NUMBER}.18-185-231-49.nip.io:30080`,
              description: 'Preview environment is ready',
              context: 'preview/environment'
            });
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
